name: Sync Weekly PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Google APIs
        run: npm install googleapis

      - name: Create credentials file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials.json

      - name: Download latest PDF from Google Drive
        run: |
          cat > sync.js << 'EOF'
          const fs = require('fs');
          const { google } = require('googleapis');

          async function main() {
            const credentials = JSON.parse(
              fs.readFileSync('credentials.json')
            );

            const auth = new google.auth.GoogleAuth({
              credentials,
              scopes: ['https://www.googleapis.com/auth/drive.readonly'],
            });

            const drive = google.drive({
              version: 'v3',
              auth,
            });

            const folderId = process.env.GOOGLE_DRIVE_FOLDER_ID;

            const res = await drive.files.list({
              q: `'${folderId}' in parents and mimeType='application/pdf' and trashed=false`,
              orderBy: 'modifiedTime desc',
              pageSize: 1,
              fields: 'files(id, name, createdTime, modifiedTime)',
            });

            if (!res.data.files.length) {
              throw new Error('找不到 PDF');
            }

            const file = res.data.files[0];

            console.log('同步 PDF:', file.name);
            console.log('建立時間:', file.createdTime);
            console.log('修改時間:', file.modifiedTime);

            const info = {
              name: file.name,
              createdTime: file.createdTime,
              modifiedTime: file.modifiedTime,
              syncedAt: new Date().toISOString()
            };

            fs.writeFileSync(
              'weekly-info.json',
              JSON.stringify(info, null, 2)
            );

            const dest = fs.createWriteStream('weekly.pdf');

            const response = await drive.files.get(
              {
                fileId: file.id,
                alt: 'media',
              },
              {
                responseType: 'stream',
              }
            );

            await new Promise((resolve, reject) => {
              response.data
                .pipe(dest)
                .on('finish', resolve)
                .on('error', reject);
            });
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node sync.js
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: Commit updated PDF and info
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weekly.pdf weekly-info.json

          git diff --cached --quiet || (
            git commit -m "Auto update weekly PDF and info"
            git push
          )
