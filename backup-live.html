<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>鼓巖教會週報</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
  margin:0;
  background:#f3f1ec;
  font-family:sans-serif;
  color:#222;
}

main{
  max-width:900px;
  margin:40px auto;
  padding:0 8px 0px;
}

.page-wrapper{
  position:relative;
  margin-bottom:30px;
  background:white;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
}

/* top可以調整cover圖的距離 */
.cover-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  z-index:3;
  pointer-events:none;
}

canvas{
  width:100%;
  display:block;
  position:relative;
  z-index:2;
  background:transparent;
}

.loading{
  text-align:center;
  padding:100px 20px;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid #ddd;
  border-top:5px solid #8b7355;
  border-radius:50%;
  margin:0 auto 20px;
  animation:spin 1s linear infinite;
}

.loading-text{
  font-size:24px;
  color:#666;
}

.error{
  text-align:center;
  padding:100px 20px;
  color:red;
  font-size:24px;
}

@keyframes spin{
  0%{
    transform:rotate(0deg);
  }
  100%{
    transform:rotate(360deg);
  }
}

/* iPad + 手機版 */

@media (max-width: 820px){

  main{
    max-width:100%;
    margin:0;
    padding:0;
  }

  .page-wrapper{
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
  }
  .page-wrapper:last-child{
  margin-bottom:0;
}

}
</style>
</head>

<body>

<main>
  <div id="pages" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">週報載入中...</div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

function base64ToUint8Array(base64) {
  const raw = atob(base64);
  const array = new Uint8Array(raw.length);

  for (let i = 0; i < raw.length; i++) {
    array[i] = raw.charCodeAt(i);
  }

  return array;
}

async function loadWeeklyPdf(data) {

  try {

    if (data.error) {
      document.getElementById("pages").innerHTML =
        `<div class="error">${data.error}</div>`;
      return;
    }

    const pdfData = base64ToUint8Array(data.base64);

    const pdf = await pdfjsLib.getDocument({
      data: pdfData
    }).promise;

    const container = document.getElementById("pages");

    container.className = "";
    container.innerHTML = "";

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

      const page = await pdf.getPage(pageNum);

      const viewport = page.getViewport({
        scale: 2
      });

      const fullCanvas = document.createElement("canvas");
      const fullContext = fullCanvas.getContext("2d");

      fullCanvas.width = viewport.width;
      fullCanvas.height = viewport.height;

      await page.render({
        canvasContext: fullContext,
        viewport: viewport
      }).promise;

      const halfWidth = fullCanvas.width / 2;

      // 第1頁：右→左
      // 第2頁：左→右
      const order = pageNum === 1
        ? [1, 0]
        : [0, 1];

      for (const i of order) {

        const splitCanvas = document.createElement("canvas");
        const splitContext = splitCanvas.getContext("2d");

        splitCanvas.width = halfWidth;
        splitCanvas.height = fullCanvas.height;

        splitContext.drawImage(
          fullCanvas,
          i * halfWidth,
          0,
          halfWidth,
          fullCanvas.height,
          0,
          0,
          halfWidth,
          fullCanvas.height
        );

        const wrapper = document.createElement("div");
        wrapper.className = "page-wrapper";


        /*下面這段是第1頁cover底圖-要暫時拿掉，用註解方式*/
        if (pageNum === 1 && i === 1) {

          const cover = document.createElement("img");

          cover.src = "cover.png";
          cover.className = "cover-bg";

          wrapper.appendChild(cover);
        }
        /*上面這段是第1頁cover底圖-要暫時拿掉，用註解方式*/

        
        wrapper.appendChild(splitCanvas);

        container.appendChild(wrapper);
      }
    }

  } catch (error) {

    console.error(error);

    document.getElementById("pages").innerHTML =
      `<div class="error">週報載入失敗</div>`;
  }
}
</script>

<script src="https://script.google.com/macros/s/AKfycbwM7YK8uB0_Pcgge6qktmdnBWMpWrCf3zjAla2LHvdyJ8u5RWyEiNW6SO_wIsxoDHFC/exec"></script>

</body>
</html>
