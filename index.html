<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鼓巖教會週報</title>

  <style>

    body{
      margin:0;
      background:#f5f5f5;
      font-family:sans-serif;
      color:#222;
    }

    .header{
      background:#d8c7a1;
      padding:50px 20px;
      text-align:center;
    }

    .header h1{
      margin:0;
      font-size:42px;
    }

    .header p{
      margin-top:10px;
      font-size:18px;
    }

    .container{
      max-width:900px;
      margin:40px auto;
      padding:20px;
    }

    .download{
      display:inline-block;
      background:#333;
      color:white;
      text-decoration:none;
      padding:14px 22px;
      border-radius:10px;
      margin-bottom:20px;
    }

    iframe{
      width:100%;
      height:1000px;
      border:none;
      background:white;
    }

    @media(max-width:768px){

      .header h1{
        font-size:30px;
      }

      iframe{
        height:700px;
      }

    }

  </style>
</head>

<body>

  <div class="header">
    <h1>鼓巖教會週報</h1>
    <p>台灣基督長老教會</p>
  </div>

  <div class="container">

    <a class="download" href="weekly.pdf" target="_blank">
      下載本週週報 PDF
    </a>

    <iframe src="weekly.pdf"></iframe>

  </div>

</body>
</html>
