<!DOCTYPE html>
<html lang="zh-Hant">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>鼓巖教會週報</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>

    body{
      margin:0;
      background:#f3f1ec;
      font-family:sans-serif;
      color:#222;
    }

    header{
      width:100%;
    }

    .cover{
      width:100%;
      display:block;
    }

    main{
      max-width:900px;
      margin:40px auto;
      padding:0 16px 80px;
    }

    .download{
      display:inline-block;
      margin-bottom:30px;
      padding:14px 22px;
      background:#333;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-size:16px;
    }

    canvas{
      width:100%;
      display:block;
      margin-bottom:30px;
      background:white;
      box-shadow:0 4px 16px rgba(0,0,0,.12);
    }

  </style>

</head>

<body>

  <header>
    <img src="cover.png" class="cover">
  </header>

  <main>

    <a class="download" href="weekly.pdf" target="_blank">
      下載原始 PDF
    </a>

    <div id="pages"></div>

  </main>

  <script>

    const url = 'weekly.pdf';

    pdfjsLib.getDocument(url).promise.then(async function(pdf) {

      const container = document.getElementById('pages');

      for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){

        const page = await pdf.getPage(pageNum);

        const viewport = page.getViewport({ scale: 2 });

        const fullCanvas = document.createElement('canvas');
        const fullContext = fullCanvas.getContext('2d');

        fullCanvas.width = viewport.width;
        fullCanvas.height = viewport.height;

        await page.render({
          canvasContext: fullContext,
          viewport: viewport
        }).promise;

        const halfWidth = fullCanvas.width / 2;

        for(let i = 1; i >= 0; i--){

          const splitCanvas = document.createElement('canvas');
          const splitContext = splitCanvas.getContext('2d');

          splitCanvas.width = halfWidth;
          splitCanvas.height = fullCanvas.height;

          splitContext.drawImage(
            fullCanvas,
            i * halfWidth,
            0,
            halfWidth,
            fullCanvas.height,
            0,
            0,
            halfWidth,
            fullCanvas.height
          );

          container.appendChild(splitCanvas);

        }

      }

    });

  </script>

</body>

</html>
