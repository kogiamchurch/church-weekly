<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>鼓巖教會週報</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<link rel="stylesheet" href="weekly.css?v=20260707-7">
</head>

<body>

<main>

  <div class="quick-links">

    <a class="quick-card mail-card" href="https://docs.google.com/forms/d/e/1FAIpQLSdkNuP4T47a7h5yCSkHeDyYf6dRgMisMRpGmdeIc_J9k3Cytg/viewform?usp=send_form" target="_blank">
      <div class="quick-icon">✉</div>
      <div>
        <div class="quick-title">教會信箱</div>
        <div class="quick-subtitle">我有話想說</div>
      </div>
    </a>

    <button id="songButton" class="quick-card song-card no-data disabled" type="button" onclick="openSongPanel()">
      <div class="quick-icon">♫</div>
      <div>
        <div class="quick-title">本週詩歌</div>
        <div id="songButtonSubtitle" class="quick-subtitle">本週尚無資料</div>
      </div>
    </button>

  </div>

  <div id="updateNotice" class="update-notice">

    <div class="update-icon">
      ⚠️
    </div>

    <div class="update-content">

      <div class="update-title">
        本週週報尚在更新中
      </div>

      <div class="update-subtitle">
        目前顯示上一期週報，敬請稍候。
      </div>

    </div>

  </div>

  <div id="pages" class="loading">週報載入中...</div>

</main>

<div id="songOverlay" class="song-overlay" onclick="closeSongPanel()">
  <div class="song-panel" onclick="event.stopPropagation()">

    <div class="song-panel-header">
      <div class="song-panel-title">本週詩歌</div>
      <button class="song-close" type="button" onclick="closeSongPanel()">×</button>
    </div>

    <div id="playerContainer" style="display:none;margin-bottom:18px;">

      <div style="
        font-size:16px;
        font-weight:700;
        margin-bottom:10px;
        color:#2f4f7f;
      ">
        正在播放
      </div>

      <iframe
        id="youtubePlayer"
        width="100%"
        height="220"
        src=""
        frameborder="0"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>

    </div>

    <div id="songList" class="song-list"></div>

  </div>
</div>

<!-- 臨時公告彈窗 -->
<div id="noticeModal" class="notice-modal" style="display: none;">
  <div class="notice-modal-backdrop"></div>

  <div class="notice-modal-box">
    <div class="notice-modal-header">
      <div class="notice-modal-label">重要提醒</div>
      <button id="noticeModalClose" class="notice-modal-close" type="button">×</button>
    </div>

    <h2 id="noticeModalTitle" class="notice-modal-title"></h2>

    <div id="noticeModalMessage" class="notice-modal-message"></div>

    <button id="noticeModalConfirm" class="notice-modal-button" type="button">
      關閉視窗
    </button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let pdfUrl = "weekly.pdf";
let currentSongs = [];
let currentPlayingIndex = null;

function openSongPanel() {
  if (!currentSongs.length) return;
  document.getElementById("songOverlay").classList.add("show");
}

function closeSongPanel() {
  document.getElementById("songOverlay").classList.remove("show");

  document.getElementById("youtubePlayer").src = "";
  document.getElementById("playerContainer").style.display = "none";

  currentPlayingIndex = null;
  renderSongs(currentSongs);
}

function playSong(url, index) {
  currentPlayingIndex = index;

  const match = url.match(
    /(?:youtu\.be\/|v=)([^&\n?#]+)/
  );

  if (!match) {
    window.open(url, "_blank");
    return;
  }

  const videoId = match[1];

  document.getElementById("playerContainer").style.display = "block";

  document.getElementById("youtubePlayer").src =
    "https://www.youtube.com/embed/" +
    videoId +
    "?autoplay=1&playsinline=1&rel=0&enablejsapi=1";

  renderSongs(currentSongs);
}

function updateSongButton(hasSongs) {
  const songButton = document.getElementById("songButton");
  const subtitle = document.getElementById("songButtonSubtitle");

  if (hasSongs) {
    songButton.classList.remove("no-data", "disabled");
    subtitle.textContent = "聆聽敬拜詩歌";
  } else {
    songButton.classList.add("no-data", "disabled");
    subtitle.textContent = "本週尚無資料";
  }
}

function renderSongs(songs) {
  const songList = document.getElementById("songList");

  songList.innerHTML = "";

  songs.forEach((song, index) => {

    const item = document.createElement("div");
    item.className = "song-item";

    if (currentPlayingIndex === index) {
      item.classList.add("is-selected");
    }

    const name = document.createElement("div");
    name.className = "song-name";
    name.textContent = (index + 1) + ". " + song.title;

    item.appendChild(name);

    if (currentPlayingIndex !== index) {

      const link = document.createElement("a");
      link.className = "song-link";
      link.href = "#";
      link.textContent = "聽詩歌";

      link.onclick = function(e){
        e.preventDefault();
        playSong(song.url, index);
      };

      item.appendChild(link);

    }

    songList.appendChild(item);

  });
}

async function loadSongs() {
  try {
    const response = await fetch("songs.json?v=" + Date.now());

    if (!response.ok) {
      currentSongs = [];
      updateSongButton(false);
      return;
    }

    const data = await response.json();

    const songUpdatedAt = data.updatedAt
      ? new Date(data.updatedAt)
      : null;

    const weekStart = getThisWeekMondayStart(new Date());

    const isCurrentWeek =
      songUpdatedAt &&
      songUpdatedAt.getTime() >= weekStart.getTime();

    const songs = isCurrentWeek && Array.isArray(data.songs)
      ? data.songs.filter(song => song.title && song.url)
      : [];

    currentSongs = songs;

    if (songs.length) {
      renderSongs(songs);
      updateSongButton(true);
    } else {
      renderSongs([]);
      updateSongButton(false);
    }

  } catch (error) {
    console.error(error);
    currentSongs = [];
    renderSongs([]);
    updateSongButton(false);
  }
}

function getThisWeekMondayStart(date) {
  const d = new Date(date);
  const day = d.getDay();

  const diffToMonday = day === 0 ? -6 : 1 - day;

  d.setDate(d.getDate() + diffToMonday);
  d.setHours(0, 0, 0, 0);

  return d;
}

function getThisWeekThursdaySix(date) {
  const monday = getThisWeekMondayStart(date);

  const thursday = new Date(monday);
  thursday.setDate(monday.getDate() + 3);
  thursday.setHours(6, 0, 0, 0);

  return thursday;
}

async function checkWeeklyUpdateNotice() {
  const notice = document.getElementById("updateNotice");

  try {
    const response = await fetch("weekly-info.json?v=" + Date.now());

    if (!response.ok) {
      notice.style.display = "none";
      return;
    }

    const info = await response.json();

    if (!info.modifiedTime) {
      notice.style.display = "none";
      return;
    }

    pdfUrl = "weekly.pdf?v=" + encodeURIComponent(info.modifiedTime);

    const now = new Date();
    const pdfUpdated = new Date(info.modifiedTime);

    const weekStart = getThisWeekMondayStart(now);
    const thursdaySix = getThisWeekThursdaySix(now);

    const shouldCheckUpdate = now.getTime() >= thursdaySix.getTime();
    const isCurrentWeekPdf = pdfUpdated.getTime() >= weekStart.getTime();

    if (shouldCheckUpdate && !isCurrentWeekPdf) {
      notice.style.display = "flex";
    } else {
      notice.style.display = "none";
    }

  } catch (error) {
    console.error(error);
    notice.style.display = "none";
  }
}

async function loadWeeklyPdf() {
  try {
    await checkWeeklyUpdateNotice();

    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
    const container = document.getElementById("pages");

    container.className = "";
    container.innerHTML = "";

    const isPortraitTabletOrMobile =
      window.matchMedia("(orientation: portrait) and (max-width: 1024px)").matches;

    const scale = isPortraitTabletOrMobile ? 2 : 3;

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      const page = await pdf.getPage(pageNum);

      const viewport = page.getViewport({
        scale: scale
      });

      const fullCanvas = document.createElement("canvas");
      const fullContext = fullCanvas.getContext("2d");

      fullCanvas.width = viewport.width;
      fullCanvas.height = viewport.height;

      await page.render({
        canvasContext: fullContext,
        viewport: viewport
      }).promise;

      const halfWidth = fullCanvas.width / 2;

      const order = pageNum === 1 ? [1, 0] : [0, 1];

      for (const i of order) {
        const splitCanvas = document.createElement("canvas");
        const splitContext = splitCanvas.getContext("2d");

        splitCanvas.width = halfWidth;
        splitCanvas.height = fullCanvas.height;

        splitContext.drawImage(
          fullCanvas,
          i * halfWidth,
          0,
          halfWidth,
          fullCanvas.height,
          0,
          0,
          halfWidth,
          fullCanvas.height
        );

        const wrapper = document.createElement("div");
        wrapper.className = "page-wrapper";

        /* 下面這段是第 1 頁 cover 底圖 */
        if (pageNum === 1 && i === 1) {
          const cover = document.createElement("img");
          cover.src = "cover.png";
          cover.className = "cover-bg";
          wrapper.appendChild(cover);
        }

        wrapper.appendChild(splitCanvas);
        container.appendChild(wrapper);
      }
    }
  } catch (error) {
    console.error(error);
    document.getElementById("pages").innerHTML =
      `<div class="error">週報載入失敗</div>`;
  }
}

const NOTICE_API_URL =
  "https://script.google.com/macros/s/AKfycbwM7YK8uB0_Pcgge6qktmdnBWMpWrCf3zjAla2LHvdyJ8u5RWyEiNW6SO_wIsxoDHFC/exec?action=getNotice";

function loadNotice(data) {
  if (!data || data.show !== true) return;

  const modal = document.getElementById("noticeModal");
  const title = document.getElementById("noticeModalTitle");
  const message = document.getElementById("noticeModalMessage");

  if (!modal || !title || !message) return;

  title.textContent = data.title || "臨時公告";
  message.textContent = data.message || "";

  modal.style.display = "flex";
}

function closeNoticeModal() {
  const modal = document.getElementById("noticeModal");

  if (modal) {
    modal.style.display = "none";
  }
}

function bindNoticeModalButtons() {
  const closeButton = document.getElementById("noticeModalClose");
  const confirmButton = document.getElementById("noticeModalConfirm");

  if (closeButton) {
    closeButton.onclick = closeNoticeModal;
  }

  if (confirmButton) {
    confirmButton.onclick = closeNoticeModal;
  }
}

function checkTemporaryNotice() {
  const script = document.createElement("script");
  script.src = NOTICE_API_URL + "&callback=loadNotice&v=" + Date.now();
  document.body.appendChild(script);
}

bindNoticeModalButtons();
loadSongs();
loadWeeklyPdf();
checkTemporaryNotice();
</script>

</body>
</html>
